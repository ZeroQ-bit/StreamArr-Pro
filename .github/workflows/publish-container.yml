name: Publish Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional extra image tag (for example v1.2.3)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: vars
        run: |
          IMAGE_NAME="$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/streamarr-pro" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="main"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          fi

          {
            echo "image_name=${IMAGE_NAME}"
            echo "version=${VERSION}"
            echo "build_date=${BUILD_DATE}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:main"
            echo "${IMAGE_NAME}:main-${SHORT_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
              echo "${IMAGE_NAME}:latest"
            fi
            if [[ -n "${{ inputs.version }}" ]]; then
              echo "${IMAGE_NAME}:${{ inputs.version }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.title=StreamArr Pro
            org.opencontainers.image.description=Self-hosted media server with Netflix-style UI
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
